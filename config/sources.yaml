# ─────────────────────────────────────────────
# Multi-Source Feed — Source Configuration
# This is a starter list — not exhaustive.
# Customize it for your interests:
#   - Disable sources you don't need (enabled: false)
#   - Add your own RSS feeds (type: rss, 4 lines each)
#   - See README.md for instructions
# ─────────────────────────────────────────────

sources:

  # ── X / Twitter (reads existing feed_raw.json) ──────────────
  - name: x-main
    type: x_feed
    enabled: true
    raw_json_path: feed_raw.json   # relative to project root
    tags: [x, social]

  # ── Hacker News ─────────────────────────────────────────────
  - name: hn-frontpage
    type: hn
    enabled: true
    hits_per_page: 30
    min_score: 20
    tags: [hn, tech]

  # ── GitHub Trending ─────────────────────────────────────────
  - name: github-daily
    type: github_trending
    enabled: true
    since: daily
    tags: [github, open-source]

  # ── AI Company Blogs (via RSS) ──────────────────────────────
  - name: openai-blog
    type: rss
    enabled: true
    url: https://openai.com/blog/rss.xml
    max_items: 10
    tags: [ai, openai, blog]

  - name: google-ai-blog
    type: rss
    enabled: true
    url: https://blog.google/technology/ai/rss/
    max_items: 10
    tags: [ai, google, blog]

  - name: meta-engineering
    type: rss
    enabled: true
    url: https://engineering.fb.com/feed/
    max_items: 10
    tags: [meta, engineering, blog]

  - name: deepmind-blog
