  # ── AI Research / Academic (via RSS) ─────────────────────────
  - name: arxiv-cs-ai
    type: rss
    enabled: true
    url: https://rss.arxiv.org/rss/cs.AI
    max_items: 15
    tags: [research, arxiv, ai]

  - name: arxiv-cs-lg
    type: rss
    enabled: true
    url: https://rss.arxiv.org/rss/cs.LG
    max_items: 15
    tags: [research, arxiv, machine-learning]

  # ── Reddit (JSON API, no auth needed) ────────────────────────────
  - name: reddit-sideproject
    type: reddit
    enabled: true
    subreddit: SideProject
    sort: hot
    max_items: 15
    tags: [reddit, sideproject, indie]

  - name: reddit-localllama
    type: reddit
    enabled: true
    subreddit: LocalLLaMA
    sort: hot
    max_items: 15
    tags: [reddit, localllama, ai, open-source]

  # ── Product Hunt (GraphQL API, needs PRODUCTHUNT_API_TOKEN) ──────
  - name: producthunt
    type: producthunt
    enabled: true
    max_items: 15
    posted_after_days: 2
    tags: [producthunt, product, startup]

  # ── Web Search (Tavily) ─────────────────────────────────────────
  # Catches trending topics not in any feed. Needs TAVILY_API_KEY env var.
  - name: search-ai-products
    type: web_search
    enabled: true
    query: "AI product launches and updates today"
    max_results: 8
    days: 2
    topic: news
    tags: [search, ai, product]

  - name: search-ai-funding
    type: web_search
    enabled: true
    query: "AI startup funding rounds and acquisitions this week"
    max_results: 5
    days: 2
    topic: news
    tags: [search, ai, funding]

  # ── Anthropic (custom scraper, no public RSS) ─────────────────
  - name: anthropic-news
    type: anthropic_news
    enabled: true
    max_items: 10
    tags: [ai, anthropic, blog]
