# XFeed Memo — Source Configuration
# Add a new source: append an entry below. RSS sources need zero code.
# Toggle any source: set enabled: true / false.

sources:

  # ── X / Twitter (reads existing feed_raw.json) ──────────────
  - name: x-main
    type: x_feed
    enabled: true
    raw_json_path: feed_raw.json   # relative to project root
    tags: [x, social]

  # ── Hacker News ─────────────────────────────────────────────
  - name: hn-frontpage
    type: hn
    enabled: true
    hits_per_page: 30
    min_score: 20
    tags: [hn, tech]

  # ── GitHub Trending ─────────────────────────────────────────
  - name: github-daily
    type: github_trending
    enabled: true
    since: daily
    tags: [github, open-source]

  # ── AI Company Blogs (via RSS) ──────────────────────────────
  - name: openai-blog
    type: rss
    enabled: true
    url: https://openai.com/blog/rss.xml
    max_items: 10
    tags: [ai, openai, blog]

  - name: google-ai-blog
    type: rss
    enabled: true
    url: https://blog.google/technology/ai/rss/
    max_items: 10
    tags: [ai, google, blog]

  - name: meta-engineering
    type: rss
    enabled: true
    url: https://engineering.fb.com/feed/
    max_items: 10
    tags: [meta, engineering, blog]

  - name: deepmind-blog
    type: rss
    enabled: true
    url: https://deepmind.google/blog/rss.xml
    max_items: 10
    tags: [ai, deepmind, blog]

  - name: microsoft-ai-blog
    type: rss
    enabled: true
    url: https://blogs.microsoft.com/ai/feed/
    max_items: 10
    tags: [ai, microsoft, blog]

  - name: nvidia-blog
    type: rss
    enabled: true
    url: https://blogs.nvidia.com/feed/
    max_items: 10
    tags: [ai, nvidia, blog]

  - name: huggingface-blog
    type: rss
    enabled: true
    url: https://huggingface.co/blog/feed.xml
    max_items: 10
    tags: [ai, huggingface, blog]

  # ── Tech Media ────────────────────────────────────────────────
  - name: techcrunch-ai
    type: rss
    enabled: true
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    max_items: 10
    tags: [media, techcrunch, ai]

  - name: theverge-ai
    type: rss
    enabled: true
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    max_items: 10
    tags: [media, theverge, ai]

  - name: mit-tech-review-ai
    type: rss
    enabled: true
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed
    max_items: 10
    tags: [media, mit, ai]

  - name: wired-ai
    type: rss
    enabled: true
    url: https://www.wired.com/feed/tag/ai/latest/rss
    max_items: 10
    tags: [media, wired, ai]

  - name: ars-technica
    type: rss
    enabled: true
    url: https://feeds.arstechnica.com/arstechnica/index
    max_items: 10
    tags: [media, arstechnica, tech]

  # ── Independent Blogs ─────────────────────────────────────────
  - name: simon-willison
    type: rss
    enabled: true
    url: https://simonwillison.net/atom/everything/
    max_items: 10
    tags: [blog, ai, dev-tools]

  # ── VC / Ecosystem ────────────────────────────────────────────
  - name: yc-blog
    type: rss
    enabled: true
    url: https://www.ycombinator.com/blog/rss
    max_items: 10
    tags: [vc, yc, startup]

  # ── Reddit (JSON API, no auth needed) ────────────────────────────
  - name: reddit-sideproject
    type: reddit
    enabled: true
    subreddit: SideProject
    sort: hot
    max_items: 15
    tags: [reddit, sideproject, indie]

  - name: reddit-localllama
    type: reddit
    enabled: true
    subreddit: LocalLLaMA
    sort: hot
    max_items: 15
    tags: [reddit, localllama, ai, open-source]

  # ── Product Hunt (GraphQL API, needs PRODUCTHUNT_API_TOKEN) ──────
  - name: producthunt
    type: producthunt
    enabled: true
    max_items: 15
    posted_after_days: 2
    tags: [producthunt, product, startup]

  # ── Web Search (Tavily) ─────────────────────────────────────────
  # Catches trending topics not in any feed. Needs TAVILY_API_KEY env var.
  - name: search-ai-products
    type: web_search
    enabled: true
    query: "AI product launches and updates today"
    max_results: 8
    days: 2
    topic: news
    tags: [search, ai, product]

  - name: search-ai-funding
    type: web_search
    enabled: true
    query: "AI startup funding rounds and acquisitions this week"
    max_results: 5
    days: 2
    topic: news
    tags: [search, ai, funding]

  # ── Anthropic (custom scraper, no public RSS) ─────────────────
  - name: anthropic-news
    type: anthropic_news
    enabled: true
    max_items: 10
    tags: [ai, anthropic, blog]
